<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brush Paint</title>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button class="tbtn on" id="b-oil" type="button">油絵</button>
        <button class="tbtn" id="b-sumi" type="button">書道</button>
        <div class="sep"></div>
        <label for="cpick">色</label>
        <input type="color" id="cpick" value="#1a0a00" class="color-input" />
        <div class="sep"></div>
        <label for="b-size">サイズ</label>
        <input id="b-size" type="range" min="4" max="80" value="22" step="1" />
        <span class="val" id="o-sz">22</span>
        <div class="sep"></div>
        <label for="b-visc">粘性</label>
        <input id="b-visc" type="range" min="1" max="10" value="5" step="1" />
        <span class="val" id="o-vi">5</span>
        <div class="sep"></div>
        <label for="b-paper">紙の粗さ</label>
        <input id="b-paper" type="range" min="1" max="10" value="4" step="1" />
        <span class="val" id="o-pa">4</span>
        <div class="sep"></div>
        <label for="b-taper">入り/抜き</label>
        <input id="b-taper" type="range" min="1" max="20" value="8" step="1" />
        <span class="val" id="o-tp">8</span>
        <div class="sep"></div>
        <button class="tbtn" id="b-undo" type="button">元に戻す</button>
        <button class="tbtn" id="b-clear" type="button">クリア</button>
        <button class="tbtn" id="b-refill" type="button">補充</button>
      </div>
      <div id="cwrap">
        <canvas id="gc"></canvas>
        <div id="hud">
          <span>インク残量</span>
          <div id="itrack"><div id="ifill"></div></div>
          <span id="ipct">100%</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/frontend/main.js"></script>
  </body>
</html>
