
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{display:flex;flex-direction:column;height:700px;background:#fff}
#toolbar{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:0.5px solid #ddd;flex-wrap:wrap}
#toolbar label{font-size:12px;color:#666}
#toolbar input[type=range]{width:72px}
#toolbar span.val{font-size:12px;font-weight:600;min-width:24px}
.tbtn{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid #bbb;background:transparent;cursor:pointer}
.tbtn.on{background:#222;color:#fff;border-color:#222}
.sep{width:1px;height:18px;background:#ddd}
#cwrap{flex:1;position:relative;overflow:hidden;cursor:crosshair}
#gc{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:absolute;bottom:8px;left:10px;display:flex;align-items:center;gap:8px;pointer-events:none}
#hud span{font-size:11px;color:#888}
#itrack{width:90px;height:4px;background:#ddd;border-radius:2px}
#ifill{height:4px;border-radius:2px;background:#333;width:100%}
</style>

<div id="app">
  <div id="toolbar">
    <button class="tbtn on" id="b-oil" onclick="setMode('oil')">油絵</button>
    <button class="tbtn" id="b-sumi" onclick="setMode('sumi')">書道</button>
    <div class="sep"></div>
    <label>色</label>
    <input type="color" id="cpick" value="#1a0a00" style="width:26px;height:26px;border:none;padding:0;background:none;cursor:pointer">
    <div class="sep"></div>
    <label>サイズ</label>
    <input type="range" id="sl-sz" min="4" max="80" value="22" step="1"
      oninput="bSize=+this.value;document.getElementById('o-sz').textContent=this.value">
    <span class="val" id="o-sz">22</span>
    <div class="sep"></div>
    <label>粘性</label>
    <input type="range" id="sl-vi" min="1" max="10" value="5" step="1"
      oninput="visc=this.value/10;document.getElementById('o-vi').textContent=this.value">
    <span class="val" id="o-vi">5</span>
    <div class="sep"></div>
    <label>紙の粗さ</label>
    <input type="range" id="sl-pa" min="1" max="10" value="4" step="1"
      oninput="paper=this.value/10;document.getElementById('o-pa').textContent=this.value">
    <span class="val" id="o-pa">4</span>
    <div class="sep"></div>
    <label>入り/抜き</label>
    <input type="range" id="sl-tp" min="1" max="20" value="8" step="1"
      oninput="taperLen=+this.value;document.getElementById('o-tp').textContent=this.value">
    <span class="val" id="o-tp">8</span>
    <div class="sep"></div>
    <button class="tbtn" onclick="clearC()">クリア</button>
    <button class="tbtn" onclick="refill()">補充</button>
  </div>
  <div id="cwrap">
    <canvas id="gc"></canvas>
    <div id="hud">
      <span>インク残量</span>
      <div id="itrack"><div id="ifill"></div></div>
      <span id="ipct">100%</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const wrap   = document.getElementById('cwrap');
function resize(){ canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight; }
resize();

const gl = canvas.getContext('webgl',{
  alpha:false, premultipliedAlpha:false,
  antialias:true, preserveDrawingBuffer:true
});

const VS=`
attribute vec2  aP;
attribute float aO;
attribute float aS;
uniform   vec2  uR;
varying   float vO;
void main(){
  vec2 p=(aP/uR)*2.0-1.0;
  gl_Position=vec4(p.x,-p.y,0,1);
  gl_PointSize=aS;
  vO=aO;
}`;
const FS=`
precision mediump float;
uniform vec3  uC;
uniform float uH;
varying float vO;
void main(){
  vec2  uv=gl_PointCoord-0.5;
  float d=length(uv)*2.0;
  float a=1.0-smoothstep(uH,1.0,d);
  gl_FragColor=vec4(uC,a*vO);
}`;

function mkSh(t,s){const h=gl.createShader(t);gl.shaderSource(h,s);gl.compileShader(h);return h;}
const prog=gl.createProgram();
gl.attachShader(prog,mkSh(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkSh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const aP=gl.getAttribLocation(prog,'aP');
const aO=gl.getAttribLocation(prog,'aO');
const aS=gl.getAttribLocation(prog,'aS');
const uR=gl.getUniformLocation(prog,'uR');
const uC=gl.getUniformLocation(prog,'uC');
const uH=gl.getUniformLocation(prog,'uH');

gl.enable(gl.BLEND);
gl.blendFuncSeparate(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA,gl.ONE,gl.ONE_MINUS_SRC_ALPHA);

function clearC(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(1,1,1,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}
clearC();

let mode='oil', bSize=22, visc=0.5, paper=0.4, taperLen=8;
let inkVol=1.0, painting=false;
let px=0,py=0,pp=0,pvx=0,pvy=0;
let bristles=[];

// ストローク全点を記録するバッファ
// 各点: {x,y,pressure,vx,vy}
let strokePath=[];

function genBristles(n){
  bristles=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const r=Math.sqrt(Math.random());
    bristles.push({dx:Math.cos(a)*r, dy:Math.sin(a)*r, ir:0.75+Math.random()*0.25});
  }
}
genBristles(20);

function hexRgb(h){
  return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];
}
function setMode(m){
  mode=m;
  document.getElementById('b-oil').className='tbtn'+(m==='oil'?' on':'');
  document.getElementById('b-sumi').className='tbtn'+(m==='sumi'?' on':'');
  genBristles(m==='sumi'?30:20);
}
function refill(){inkVol=1.0;updateHUD();}
function updateHUD(){
  const p=Math.round(inkVol*100);
  document.getElementById('ipct').textContent=p+'%';
  document.getElementById('ifill').style.width=p+'%';
}

const MAX_B=64;
const posArr=new Float32Array(MAX_B*2);
const opArr=new Float32Array(MAX_B);
const szArr=new Float32Array(MAX_B);
const posBuf=gl.createBuffer();
const opBuf=gl.createBuffer();
const szBuf=gl.createBuffer();

// taperEnvelope: ストローク全体でのインデックスiに対して
// 入り(先頭)と抜き(末尾)のスケール係数(0→1→0)を返す
function taperEnvelope(i, total){
  const tLen = Math.min(taperLen, Math.floor(total * 0.45));
  let env = 1.0;

  // 入り: 先頭tLen点をsinカーブで 0→1
  if(i < tLen){
    env = Math.sin((i / tLen) * Math.PI * 0.5);
    // 凸形状（入りをよりシャープに）
    env = Math.pow(env, 0.6);
  }
  // 抜き: 末尾tLen点をsinカーブで 1→0
  else if(i >= total - tLen){
    const t = (i - (total - tLen)) / tLen;
    env = Math.cos(t * Math.PI * 0.5);
    env = Math.pow(env, 0.8);
  }
  return env;
}

function drawPoint(x, y, pressure, vx, vy, envScale){
  if(inkVol<=0.005) return;
  const isOil=(mode==='oil');
  const speed=Math.sqrt(vx*vx+vy*vy);

  const consume=isOil
    ? pressure*(0.002+speed*0.0008)*(1-visc*0.3)
    : pressure*(0.004+speed*0.0015);
  inkVol=Math.max(0,inkVol-consume);

  const inkF=Math.pow(inkVol,0.35);

  // ★ 筆圧→太さのカーブ改善
  // べき乗2.0で低圧時に極端に細く、高圧時にしっかり太く
  const pressureCurved = Math.pow(pressure, 1.8);

  // ★ 入り/抜きのエンベロープをspreadとopacityに適用
  const spread = pressureCurved * bSize * 0.55 * envScale;

  const [r,g,b]=hexRgb(document.getElementById('cpick').value);
  const n=bristles.length;

  for(let i=0;i<n;i++){
    const br=bristles[i];
    posArr[i*2  ]=x+br.dx*spread+vx*0.2;
    posArr[i*2+1]=y+br.dy*spread+vy*0.2;

    const paperNoise=1-paper*Math.random()*0.75;
    const edge=1-Math.sqrt(br.dx*br.dx+br.dy*br.dy)*0.55;
    let op=pressureCurved*inkF*br.ir*edge*paperNoise*envScale;
    if(isOil) op*=(0.45+visc*0.55);
    else       op*=(0.55+pressure*0.45);
    opArr[i]=Math.max(0,Math.min(1,op));

    const base=bSize*(isOil?0.32:0.22);
    szArr[i]=Math.max(1,base*(isOil
      ?(0.5+pressureCurved*0.6)*(0.7+Math.random()*0.6)*envScale
      :(0.3+pressureCurved*0.9)*(0.8+Math.random()*0.4)*envScale));
  }

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform2f(uR,canvas.width,canvas.height);
  gl.uniform3f(uC,r,g,b);
  gl.uniform1f(uH,isOil?0.25+visc*0.3:0.55+pressure*0.15);

  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.bufferData(gl.ARRAY_BUFFER,posArr.subarray(0,n*2),gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,opBuf);
  gl.bufferData(gl.ARRAY_BUFFER,opArr.subarray(0,n),gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aO);
  gl.vertexAttribPointer(aO,1,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,szBuf);
  gl.bufferData(gl.ARRAY_BUFFER,szArr.subarray(0,n),gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aS);
  gl.vertexAttribPointer(aS,1,gl.FLOAT,false,0,0);

  gl.drawArrays(gl.POINTS,0,n);
}

// リアルタイムで追加描画（ストロークの途中）
// 入り分はenvScale=1で描き進め、後でPointerUpに再描画で上書き
let drawnCount=0;

function addToStroke(x,y,p,vx,vy){
  strokePath.push({x,y,p,vx,vy});
  const i=strokePath.length-1;
  const envNow=taperEnvelope(i, Math.max(strokePath.length, taperLen*2+1));
  drawPoint(x,y,p,vx,vy,envNow);
  drawnCount++;
  updateHUD();
}

// PointerUp時: ストロークを最初から再描画して入り・抜きを確定させる
// キャンバスをclearしてから全ストローク履歴を再生
let allStrokes=[]; // 完了したストロークを蓄積

function finalizeStroke(){
  if(strokePath.length<2){ strokePath=[]; return; }

  // 現在のストロークを履歴に保存
  allStrokes.push({
    path:[...strokePath],
    mode,bSize,visc,paper,taperLen,
    color:document.getElementById('cpick').value
  });
  strokePath=[];

  // キャンバス全消去して全ストローク再描画
  clearC();
  const savedInk=inkVol;
  for(const stroke of allStrokes){
    replayStroke(stroke);
  }
  inkVol=savedInk;
  updateHUD();
}

function replayStroke(stroke){
  const {path,color}=stroke;
  const total=path.length;
  const savedMode=mode, savedBSize=bSize, savedVisc=visc,
        savedPaper=paper, savedTaperLen=taperLen;

  mode=stroke.mode; bSize=stroke.bSize; visc=stroke.visc;
  paper=stroke.paper; taperLen=stroke.taperLen;
  genBristles(mode==='sumi'?30:20);

  const savedColor=document.getElementById('cpick').value;
  document.getElementById('cpick').value=color;

  for(let i=0;i<total;i++){
    const pt=path[i];
    const env=taperEnvelope(i,total);
    drawPoint(pt.x,pt.y,pt.p,pt.vx,pt.vy,env);
  }

  mode=savedMode; bSize=savedBSize; visc=savedVisc;
  paper=savedPaper; taperLen=savedTaperLen;
  document.getElementById('cpick').value=savedColor;
  genBristles(mode==='sumi'?30:20);
}

function getP(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{
    x:t.clientX-rect.left,
    y:t.clientY-rect.top,
    p:(e.pressure!=null&&e.pressure>0)?e.pressure:0.5
  };
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  painting=true;
  strokePath=[];
  drawnCount=0;
  const q=getP(e);
  px=q.x;py=q.y;pp=q.p;pvx=0;pvy=0;
  genBristles(mode==='sumi'?30:20);
  addToStroke(q.x,q.y,q.p,0,0);
});

canvas.addEventListener('pointermove',e=>{
  e.preventDefault();
  if(!painting)return;
  const q=getP(e);
  const dx=q.x-px,dy=q.y-py;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<1.5)return;

  const vx=dx*0.5+pvx*0.5;
  const vy=dy*0.5+pvy*0.5;
  pvx=vx;pvy=vy;

  const steps=Math.max(1,Math.ceil(dist/(bSize*0.15)));
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    addToStroke(px+dx*t,py+dy*t,pp+(q.p-pp)*t,vx,vy);
  }
  px=q.x;py=q.y;pp=q.p;
});

canvas.addEventListener('pointerup',e=>{
  e.preventDefault();
  painting=false;
  finalizeStroke();
});
canvas.addEventListener('pointerleave',e=>{
  e.preventDefault();
  if(painting){painting=false;finalizeStroke();}
});
canvas.style.touchAction='none';

window.addEventListener('resize',()=>{resize();clearC();allStrokes=[];});
</script>
