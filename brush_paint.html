<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筆ペイント v0.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
#toolbar{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;background:#fff;
  border-bottom:1px solid #ddd;flex-wrap:wrap
}
#toolbar label{font-size:12px;color:#666}
#toolbar input[type=range]{width:72px}
#toolbar span.val{font-size:12px;font-weight:600;min-width:24px}
.tbtn{
  padding:4px 10px;font-size:12px;border-radius:6px;
  border:1px solid #bbb;background:transparent;cursor:pointer
}
.tbtn.on{background:#222;color:#fff;border-color:#222}
.sep{width:1px;height:18px;background:#ddd}
#cwrap{flex:1;position:relative;overflow:hidden;cursor:crosshair}
#gc{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{
  position:absolute;bottom:10px;left:12px;
  display:flex;align-items:center;gap:8px;pointer-events:none
}
#hud span{font-size:11px;color:#888}
#itrack{width:90px;height:4px;background:#ddd;border-radius:2px}
#ifill{height:4px;border-radius:2px;background:#333;width:100%;transition:width 0.05s}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button class="tbtn on" id="b-oil" onclick="setMode('oil')">油絵</button>
    <button class="tbtn" id="b-sumi" onclick="setMode('sumi')">書道</button>
    <div class="sep"></div>
    <label>色</label>
    <input type="color" id="cpick" value="#1a0a00"
      style="width:26px;height:26px;border:none;padding:0;background:none;cursor:pointer">
    <div class="sep"></div>
    <label>サイズ</label>
    <input type="range" id="sl-sz" min="4" max="80" value="18" step="1"
      oninput="bSize=+this.value;document.getElementById('o-sz').textContent=this.value">
    <span class="val" id="o-sz">18</span>
    <div class="sep"></div>
    <label>粘性</label>
    <input type="range" id="sl-vi" min="1" max="10" value="5" step="1"
      oninput="visc=this.value/10;document.getElementById('o-vi').textContent=this.value">
    <span class="val" id="o-vi">5</span>
    <div class="sep"></div>
    <label>紙の粗さ</label>
    <input type="range" id="sl-pa" min="1" max="10" value="4" step="1"
      oninput="paper=this.value/10;document.getElementById('o-pa').textContent=this.value">
    <span class="val" id="o-pa">4</span>
    <div class="sep"></div>
    <button class="tbtn" onclick="clearC()">クリア</button>
    <button class="tbtn" onclick="refill()">インク補充</button>
    <button class="tbtn" onclick="saveImg()">保存</button>
  </div>
  <div id="cwrap">
    <canvas id="gc"></canvas>
    <div id="hud">
      <span>インク残量</span>
      <div id="itrack"><div id="ifill"></div></div>
      <span id="ipct">100%</span>
    </div>
  </div>
</div>

<script>
/* ── キャンバス初期化 ── */
const canvas = document.getElementById('gc');
const wrap   = document.getElementById('cwrap');

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();

const gl = canvas.getContext('webgl', {
  alpha: false,               // 黒潰れ防止
  premultipliedAlpha: false,
  antialias: true,
  preserveDrawingBuffer: true // saveImg() のため
});
if (!gl) {
  alert('WebGLが使えません。ブラウザまたはGPUドライバを確認してください。');
}

/* ── シェーダー ── */
// 頂点シェーダー：各筆毛の位置・サイズを決める
const VS = `
  attribute vec2  aP;   // 筆毛の座標
  attribute float aO;   // 不透明度
  attribute float aS;   // ポイントサイズ（px）
  uniform   vec2  uR;   // キャンバス解像度
  varying   float vO;

  void main() {
    vec2 p = (aP / uR) * 2.0 - 1.0;
    gl_Position  = vec4(p.x, -p.y, 0, 1);
    gl_PointSize = aS;
    vO = aO;
  }
`;

// フラグメントシェーダー：各ポイントを円形にぼかして描く
const FS = `
  precision mediump float;
  uniform vec3  uC;  // RGB色
  uniform float uH;  // エッジ硬さ（0=ふわふわ, 1=くっきり）
  varying float vO;

  void main() {
    vec2  uv = gl_PointCoord - 0.5;
    float d  = length(uv) * 2.0;
    float a  = 1.0 - smoothstep(uH, 1.0, d);
    gl_FragColor = vec4(uC, a * vO);
  }
`;

function mkShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(sh));
  return sh;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const aP = gl.getAttribLocation(prog, 'aP');
const aO = gl.getAttribLocation(prog, 'aO');
const aS = gl.getAttribLocation(prog, 'aS');
const uR = gl.getUniformLocation(prog, 'uR');
const uC = gl.getUniformLocation(prog, 'uC');
const uH = gl.getUniformLocation(prog, 'uH');

// RGBとアルファを別々にブレンド（黒潰れ防止）
gl.enable(gl.BLEND);
gl.blendFuncSeparate(
  gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA,
  gl.ONE,       gl.ONE_MINUS_SRC_ALPHA
);

/* ── 白紙クリア ── */
function clearC() {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(1, 1, 1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}
clearC();

/* ── 状態変数 ── */
let mode    = 'oil';
let bSize   = 18;    // 筆サイズ（px）
let visc    = 0.5;   // 粘性（0〜1）。高いほど滑らか・長持ち
let paper   = 0.4;   // 紙の粗さ（0〜1）。高いほどかすれやすい
let inkVol  = 1.0;   // インク残量（0〜1）
let painting = false;
let px=0, py=0, pp=0, pvx=0, pvy=0;
let bristles = [];   // 毛束データ

/* ── 毛束を生成 ──
   各毛: dx/dy=筆毛の相対位置（-1〜1の単位円内）、ir=インク保持率
   円内にランダム配置することで自然な広がりを再現
*/
function genBristles(n) {
  bristles = [];
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r     = Math.sqrt(Math.random()); // 面積均等分布
    bristles.push({
      dx: Math.cos(angle) * r,
      dy: Math.sin(angle) * r,
      ir: 0.75 + Math.random() * 0.25  // 毛ごとのインク保持率のばらつき
    });
  }
}
genBristles(20);

function hexRgb(h) {
  return [
    parseInt(h.slice(1,3), 16) / 255,
    parseInt(h.slice(3,5), 16) / 255,
    parseInt(h.slice(5,7), 16) / 255
  ];
}

function setMode(m) {
  mode = m;
  document.getElementById('b-oil').className  = 'tbtn' + (m==='oil'  ? ' on' : '');
  document.getElementById('b-sumi').className = 'tbtn' + (m==='sumi' ? ' on' : '');
  genBristles(m === 'sumi' ? 30 : 20);
}

function refill()  { inkVol = 1.0; updateHUD(); }
function updateHUD() {
  const p = Math.round(inkVol * 100);
  document.getElementById('ipct').textContent  = p + '%';
  document.getElementById('ifill').style.width = p + '%';
}

function saveImg() {
  const a = document.createElement('a');
  a.download = 'painting.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ── GPU 転送バッファ（毎フレーム再利用） ── */
const MAX_B   = 64;
const posArr  = new Float32Array(MAX_B * 2);
const opArr   = new Float32Array(MAX_B);
const szArr   = new Float32Array(MAX_B);
const posBuf  = gl.createBuffer();
const opBuf   = gl.createBuffer();
const szBuf   = gl.createBuffer();

/* ── メイン描画関数 ──
   x, y  : キャンバス座標
   pressure : 筆圧 (0〜1)
   vx, vy   : ストローク速度（ピクセル/フレーム）
*/
function drawAt(x, y, pressure, vx, vy) {
  if (inkVol <= 0.005) return;

  const isOil = (mode === 'oil');
  const speed = Math.sqrt(vx*vx + vy*vy);

  /* インク消耗量
     - 筆圧が大きいほど多く消耗
     - 速度が速いほど消耗が少ない（供給が追いつかない物理）
     - 粘性が高いほど油絵は消耗が遅い
  */
  const consume = isOil
    ? pressure * (0.002 + speed * 0.0008) * (1 - visc * 0.3)
    : pressure * (0.004 + speed * 0.0015);
  inkVol = Math.max(0, inkVol - consume);
  updateHUD();

  // インク残量が少ないほど全体が薄くなる（べき乗で非線形に）
  const inkF   = Math.pow(inkVol, 0.35);
  const spread = pressure * bSize * 0.5; // 筆圧で毛束の広がりを変化
  const [r,g,b] = hexRgb(document.getElementById('cpick').value);
  const n = bristles.length;

  for (let i = 0; i < n; i++) {
    const br = bristles[i];

    // 各毛の座標 = 筆先座標 + 広がりオフセット + 速度由来のなびき
    posArr[i*2  ] = x + br.dx * spread + vx * 0.25;
    posArr[i*2+1] = y + br.dy * spread + vy * 0.25;

    /* 不透明度の計算
       - paperNoise: 紙の凹凸で毛ごとにランダムにかすれる
       - edge      : 毛束の端ほど薄い（自然な筆先の形）
       - 書道は筆圧でより鋭くコントラストが出る
    */
    const paperNoise = 1 - paper * Math.random() * 0.75;
    const edge       = 1 - Math.sqrt(br.dx*br.dx + br.dy*br.dy) * 0.5;
    let op = pressure * inkF * br.ir * edge * paperNoise;
    if (isOil) op *= (0.45 + visc * 0.55);
    else        op *= (0.55 + pressure * 0.45);
    opArr[i] = Math.max(0, Math.min(1, op));

    // ポイントサイズ：筆圧 × ランダムゆらぎ
    const base = bSize * (isOil ? 0.32 : 0.22);
    szArr[i] = Math.max(1, base * (isOil
      ? (0.5 + pressure*0.6) * (0.7 + Math.random()*0.6)
      : (0.3 + pressure*0.9) * (0.8 + Math.random()*0.4)));
  }

  // GPU にデータを転送して描画
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform3f(uC, r, g, b);
  gl.uniform1f(uH, isOil ? 0.25 + visc*0.3 : 0.55 + pressure*0.15);

  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, posArr.subarray(0, n*2), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, opBuf);
  gl.bufferData(gl.ARRAY_BUFFER, opArr.subarray(0, n), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aO);
  gl.vertexAttribPointer(aO, 1, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, szBuf);
  gl.bufferData(gl.ARRAY_BUFFER, szArr.subarray(0, n), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aS);
  gl.vertexAttribPointer(aS, 1, gl.FLOAT, false, 0, 0);

  gl.drawArrays(gl.POINTS, 0, n);
}

/* ── ポインターイベント ── */
function getP(e) {
  const rect = canvas.getBoundingClientRect();
  const t    = e.touches ? e.touches[0] : e;
  return {
    x: t.clientX - rect.left,
    y: t.clientY - rect.top,
    // Pointer Events API: e.pressure が 0 より大きければ実際の筆圧、
    // マウスの場合は 0.5 固定（左ボタン押下中）
    p: (e.pressure != null && e.pressure > 0) ? e.pressure : 0.5
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  painting = true;
  const q = getP(e);
  px=q.x; py=q.y; pp=q.p; pvx=0; pvy=0;
  genBristles(mode === 'sumi' ? 30 : 20); // ストローク開始時に毛束を再生成
  drawAt(q.x, q.y, q.p, 0, 0);
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!painting) return;
  const q  = getP(e);
  const dx = q.x - px, dy = q.y - py;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 1.2) return; // 微小移動は無視

  // 速度を指数移動平均でスムーズに
  const vx = dx*0.5 + pvx*0.5;
  const vy = dy*0.5 + pvy*0.5;
  pvx=vx; pvy=vy;

  // 前フレームと今フレームの間を補間して描く（線が途切れないように）
  const steps = Math.max(1, Math.ceil(dist / (bSize * 0.15)));
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    drawAt(px+dx*t, py+dy*t, pp+(q.p-pp)*t, vx, vy);
  }
  px=q.x; py=q.y; pp=q.p;
});

canvas.addEventListener('pointerup',    e => { e.preventDefault(); painting=false; });
canvas.addEventListener('pointerleave', e => { e.preventDefault(); painting=false; });
canvas.style.touchAction = 'none';

window.addEventListener('resize', () => { resize(); clearC(); });
</script>
</body>
</html>
