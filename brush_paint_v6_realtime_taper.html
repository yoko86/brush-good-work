
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{display:flex;flex-direction:column;height:700px;background:#fff}
#toolbar{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:0.5px solid #ddd;flex-wrap:wrap}
#toolbar label{font-size:12px;color:#666}
#toolbar input[type=range]{width:72px}
.val{font-size:12px;font-weight:600;min-width:24px}
.tbtn{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid #bbb;background:transparent;cursor:pointer}
.tbtn.on{background:#222;color:#fff;border-color:#222}
.sep{width:1px;height:18px;background:#ddd}
#cwrap{flex:1;position:relative;overflow:hidden;cursor:crosshair}
#gc{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:absolute;bottom:8px;left:10px;display:flex;align-items:center;gap:8px;pointer-events:none}
#hud span{font-size:11px;color:#888}
#itrack{width:90px;height:4px;background:#ddd;border-radius:2px}
#ifill{height:4px;border-radius:2px;background:#333;width:100%}
</style>

<div id="app">
  <div id="toolbar">
    <button class="tbtn on" id="b-oil" onclick="setMode('oil')">油絵</button>
    <button class="tbtn" id="b-sumi" onclick="setMode('sumi')">書道</button>
    <div class="sep"></div>
    <label>色</label>
    <input type="color" id="cpick" value="#1a0a00" style="width:26px;height:26px;border:none;padding:0;background:none;cursor:pointer">
    <div class="sep"></div>
    <label>サイズ</label>
    <input type="range" min="4" max="200" value="80" step="1"
      oninput="bSize=+this.value;document.getElementById('o-sz').textContent=this.value">
    <span class="val" id="o-sz">80</span>
    <div class="sep"></div>
    <label>粘性</label>
    <input type="range" min="1" max="10" value="10" step="1"
      oninput="visc=this.value/10;document.getElementById('o-vi').textContent=this.value">
    <span class="val" id="o-vi">10</span>
    <div class="sep"></div>
    <label>紙の粗さ</label>
    <input type="range" min="1" max="10" value="1" step="1"
      oninput="paper=this.value/10;document.getElementById('o-pa').textContent=this.value">
    <span class="val" id="o-pa">1</span>
    <div class="sep"></div>
    <label>入り/抜き</label>
    <input type="range" min="1" max="20" value="20" step="1"
      oninput="taperLen=+this.value;document.getElementById('o-tp').textContent=this.value">
    <span class="val" id="o-tp">20</span>
    <div class="sep"></div>
    <button class="tbtn" onclick="undoStroke()">元に戻す</button>
    <button class="tbtn" onclick="clearAll()">クリア</button>
    <button class="tbtn" onclick="refill()">補充</button>
  </div>
  <div id="cwrap">
    <canvas id="gc"></canvas>
    <div id="hud">
      <span>インク残量</span>
      <div id="itrack"><div id="ifill"></div></div>
      <span id="ipct">100%</span>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('gc');
const wrap=document.getElementById('cwrap');
function resize(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;}
resize();

const gl=canvas.getContext('webgl',{alpha:false,premultipliedAlpha:false,antialias:true,preserveDrawingBuffer:true});

const VS=`
attribute vec2 aP;attribute float aO;attribute float aS;
uniform vec2 uR;varying float vO;
void main(){
  vec2 p=(aP/uR)*2.0-1.0;
  gl_Position=vec4(p.x,-p.y,0,1);
  gl_PointSize=aS;vO=aO;
}`;
const FS=`
precision mediump float;
uniform vec3 uC;uniform float uH;varying float vO;
void main(){
  vec2 uv=gl_PointCoord-0.5;float d=length(uv)*2.0;
  float a=1.0-smoothstep(uH,1.0,d);
  gl_FragColor=vec4(uC,a*vO);
}`;

function mkSh(t,s){const h=gl.createShader(t);gl.shaderSource(h,s);gl.compileShader(h);return h;}
const prog=gl.createProgram();
gl.attachShader(prog,mkSh(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkSh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const locP=gl.getAttribLocation(prog,'aP');
const locO=gl.getAttribLocation(prog,'aO');
const locS=gl.getAttribLocation(prog,'aS');
const locR=gl.getUniformLocation(prog,'uR');
const locC=gl.getUniformLocation(prog,'uC');
const locH=gl.getUniformLocation(prog,'uH');

gl.enable(gl.BLEND);
gl.blendFuncSeparate(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA,gl.ONE,gl.ONE_MINUS_SRC_ALPHA);

function wipe(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(1,1,1,1);gl.clear(gl.COLOR_BUFFER_BIT);
}
wipe();

let mode='oil',bSize=80,visc=1.0,paper=0.4,taperLen=20;
let inkVol=1.0,painting=false;
let px=0,py=0,pp=0,pvx=0,pvy=0;
let bristles=[];

function genBristles(n){
  bristles=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random());
    bristles.push({dx:Math.cos(a)*r,dy:Math.sin(a)*r,ir:0.75+Math.random()*0.25});
  }
}
genBristles(20);

function hexRgb(h){
  return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];
}
function setMode(m){
  mode=m;
  document.getElementById('b-oil').className='tbtn'+(m==='oil'?' on':'');
  document.getElementById('b-sumi').className='tbtn'+(m==='sumi'?' on':'');
}
function refill(){inkVol=1.0;updateHUD();}
function updateHUD(){
  const p=Math.round(inkVol*100);
  document.getElementById('ipct').textContent=p+'%';
  document.getElementById('ifill').style.width=p+'%';
}

const posBuf=gl.createBuffer();
const opBuf=gl.createBuffer();
const szBuf=gl.createBuffer();

// 完成済みストローク（再描画・undo用）
let finishedStrokes=[];

// 現在のストローク
// rawPath: [{x,y,p,vx,vy}]
// savedData: env=1で生成した毛束データ（ランダム値固定済み）
let rawPath=[];
let savedData=[];

// 入りエンベロープ（インデックスiのみで決まる、リアルタイム確定）
function inEnv(i){
  if(i>=taperLen) return 1.0;
  return Math.pow(Math.sin((i/taperLen)*Math.PI*0.5),0.6);
}

// 抜きエンベロープ（total確定後にしか計算できない）
function outEnv(i,total){
  const tLen=Math.min(taperLen,Math.floor(total*0.45));
  if(i<total-tLen) return 1.0;
  return Math.pow(Math.cos(((i-(total-tLen))/tLen)*Math.PI*0.5),0.8);
}

// env=1でデータを生成してキャッシュ（ランダム値を固定）
function buildData(x,y,pressure,vx,vy,rgb){
  const isOil=(mode==='oil');
  const pressC=Math.pow(pressure,1.0);
  const spread=pressC*bSize*0.35;
  const inkF=Math.pow(inkVol,0.35);
  const n=bristles.length;
  const pos=new Float32Array(n*2);
  const op=new Float32Array(n);
  const sz=new Float32Array(n);
  for(let i=0;i<n;i++){
    const br=bristles[i];
    pos[i*2  ]=x+br.dx*spread+vx*0.2;
    pos[i*2+1]=y+br.dy*spread+vy*0.2;
    const pNoise=1-paper*Math.random()*0.75;
    const edge=1-Math.sqrt(br.dx*br.dx+br.dy*br.dy)*0.55;
    let o=pressC*inkF*br.ir*edge*pNoise;
    if(isOil) o*=(0.45+visc*0.55); else o*=(0.55+pressure*0.45);
    op[i]=Math.max(0.3,Math.min(1,o));
    const base=bSize*(isOil?0.32:0.80);
    sz[i]=Math.max(0.5,base*(isOil
      ?(0.2+pressC*0.8)*(0.7+Math.random()*0.6)
      :(0.2+pressC*1.0)*(0.8+Math.random()*0.4)));
  }
  return{x,y,pos,op,sz,n,hardness:isOil?0.25+visc*0.3:0.55+pressure*0.15,rgb:[...rgb]};
}

// env倍でposを中心に収縮、op・szもスケール
function applyEnv(d,env){
  if(env===1.0) return d;
  const pos2=new Float32Array(d.n*2);
  const op2=new Float32Array(d.n);
  const sz2=new Float32Array(d.n);
  for(let j=0;j<d.n;j++){
    pos2[j*2  ]=d.x+(d.pos[j*2  ]-d.x)*env;
    pos2[j*2+1]=d.y+(d.pos[j*2+1]-d.y)*env;
    op2[j]=d.op[j]*env;
    sz2[j]=Math.max(0.1,d.sz[j]*env);
  }
  return{...d,pos:pos2,op:op2,sz:sz2};
}

function flushData(d){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform2f(locR,canvas.width,canvas.height);
  gl.uniform3f(locC,d.rgb[0],d.rgb[1],d.rgb[2]);
  gl.uniform1f(locH,d.hardness);
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.bufferData(gl.ARRAY_BUFFER,d.pos,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(locP);
  gl.vertexAttribPointer(locP,2,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,opBuf);
  gl.bufferData(gl.ARRAY_BUFFER,d.op,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(locO);
  gl.vertexAttribPointer(locO,1,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,szBuf);
  gl.bufferData(gl.ARRAY_BUFFER,d.sz,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(locS);
  gl.vertexAttribPointer(locS,1,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,d.n);
}

// リアルタイム描画：入りenvのみ適用してそのまま描く
function drawLive(x,y,pressure,vx,vy){
  if(inkVol<=0.005)return;
  const isOil=(mode==='oil');
  const speed=Math.sqrt(vx*vx+vy*vy);
  inkVol=Math.max(0.1,inkVol-(isOil
    ?pressure*(0.002+speed*0.0008)*(1-visc*0.3)
    :pressure*(0.004+speed*0.0015)));
  updateHUD();
  const i=rawPath.length;
  const env=inEnv(i);
  const rgb=hexRgb(document.getElementById('cpick').value);
  const d=buildData(x,y,pressure,vx,vy,rgb);
  savedData.push(d);
  flushData(applyEnv(d,env));
}

// PointerUp：末尾taperLen点だけ白で消してから抜きenvで再描画
function finalizeStroke(){
  const total=rawPath.length;
  if(total<2){rawPath=[];savedData=[];return;}

  const tLen=Math.min(taperLen,Math.floor(total*0.45));
  const tailStart=total-tLen;

  // 末尾tLen点を白で塗りつぶして消す
  // → その領域を白矩形で上書きするのではなく、
  //   finishedStrokes全体+現在ストロークのtailStart点までを再描画して
  //   そこから抜きenvで残りを上書き
  wipe();
  for(const s of finishedStrokes)
    for(const d of s) flushData(d);

  // 現在ストローク確定版を構築
  const calls=[];
  for(let i=0;i<total;i++){
    const iEnv=inEnv(i);
    const oEnv=outEnv(i,total);
    const env=Math.min(iEnv,oEnv);
    calls.push(applyEnv(savedData[i],env));
  }
  for(const d of calls) flushData(d);

  finishedStrokes.push(calls);
  rawPath=[];savedData=[];
}

function redrawAll(){
  wipe();
  for(const s of finishedStrokes)
    for(const d of s) flushData(d);
}
function undoStroke(){
  if(!finishedStrokes.length)return;
  finishedStrokes.pop();redrawAll();
}
function clearAll(){finishedStrokes=[];rawPath=[];savedData=[];wipe();}

function getP(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{
    x:t.clientX-rect.left,y:t.clientY-rect.top,
    p:(e.pressure!=null&&e.pressure>0)?e.pressure:0.5
  };
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();painting=true;
  rawPath=[];savedData=[];
  const q=getP(e);
  px=q.x;py=q.y;pp=q.p;pvx=0;pvy=0;
  genBristles(mode==='sumi'?30:20);
  rawPath.push({x:q.x,y:q.y,p:q.p,vx:0,vy:0});
  drawLive(q.x,q.y,q.p,0,0);
});

canvas.addEventListener('pointermove',e=>{
  e.preventDefault();
  if(!painting)return;
  const q=getP(e);
  const dx=q.x-px,dy=q.y-py;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<1.5)return;
  const vx=dx*0.5+pvx*0.5,vy=dy*0.5+pvy*0.5;
  pvx=vx;pvy=vy;
  const steps=Math.max(1,Math.ceil(dist/(bSize*0.15)));
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    const ix=px+dx*t,iy=py+dy*t,ip=pp+(q.p-pp)*t;
    rawPath.push({x:ix,y:iy,p:ip,vx,vy});
    drawLive(ix,iy,ip,vx,vy);
  }
  px=q.x;py=q.y;pp=q.p;
});

canvas.addEventListener('pointerup',e=>{e.preventDefault();painting=false;finalizeStroke();});
canvas.addEventListener('pointerleave',e=>{e.preventDefault();if(painting){painting=false;finalizeStroke();}});
canvas.style.touchAction='none';
window.addEventListener('resize',()=>{resize();redrawAll();});
</script>
